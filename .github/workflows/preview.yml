name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy preview to Netlify
        id: deploy
        run: |
          output=$(npx netlify-cli@latest deploy \
            --dir=dist \
            --alias="pr-${{ github.event.pull_request.number }}" \
            --json \
            --message="PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }})")
          echo "url=$(echo "$output" | jq -r '.deploy_url')" >> $GITHUB_OUTPUT
          echo "deploy_id=$(echo "$output" | jq -r '.deploy_id')" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.url }}';
            const deployId = '${{ steps.deploy.outputs.deploy_id }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              '## Preview Deployment',
              '',
              '| | |',
              '|---|---|',
              `| **URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Branch** | \`${{ github.head_ref }}\` |`,
              `| **Commit** | \`${sha}\` |`,
              '',
              `<!-- netlify-deploy-id: ${deployId} -->`,
              '',
              '_Preview is removed when this PR is closed._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview and update PR comment
        uses: actions/github-script@v7
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Preview Deployment')
            );

            if (!existing) return;

            // Delete the Netlify deploy
            const match = existing.body.match(/<!-- netlify-deploy-id: (\w+) -->/);
            if (match) {
              try {
                await fetch(`https://api.netlify.com/api/v1/deploys/${match[1]}`, {
                  method: 'DELETE',
                  headers: { Authorization: `Bearer ${process.env.NETLIFY_AUTH_TOKEN}` },
                });
              } catch (e) {
                console.log('Could not delete deploy:', e.message);
              }
            }

            const action = context.payload.pull_request.merged ? 'merged' : 'closed';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: existing.body.replace(
                '_Preview is removed when this PR is closed._',
                `~~Preview removed~~ — this PR was **${action}**.`
              ),
            });
